name: Package and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'

env:
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
  WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone Project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure Git User
        run: |
          git config --global user.name "donniedice"
          git config --global user.email "donniedice@protonmail.com"

      - name: Determine Release Type
        id: release_type
        run: |
          case "${{ github.ref }}" in
            refs/tags/*)
              if [[ "${{ github.ref }}" == *"beta"* ]]; then
                echo "type=beta" >> $GITHUB_OUTPUT
              elif [[ "${{ github.ref }}" == *"alpha"* ]]; then
                echo "type=alpha" >> $GITHUB_OUTPUT
              else
                echo "type=release" >> $GITHUB_OUTPUT
              fi
              ;;
            refs/heads/dev)
              echo "type=dev" >> $GITHUB_OUTPUT
              ;;
            refs/heads/alpha)
              echo "type=alpha-branch" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "type=unknown" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Extract Version from TOC
        id: version
        run: |
          version=$(grep -oP '^## Version: \K(.*)' RGX-Hello.toc)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" >> $GITHUB_OUTPUT

      - name: Validate Release Metadata
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          curse_id="$(grep -oP '^## X-Curse-Project-ID:\s*\K(.*)' RGX-Hello.toc || true)"
          wago_id="$(grep -oP '^## X-Wago-ID:\s*\K(.*)' RGX-Hello.toc || true)"
          wowi_id="$(grep -oP '^## X-WoWI-ID:\s*\K(.*)' RGX-Hello.toc || true)"

          echo "Detected project IDs:"
          echo "  X-Curse-Project-ID: ${curse_id:-missing}"
          echo "  X-Wago-ID: ${wago_id:-missing}"
          echo "  X-WoWI-ID: ${wowi_id:-missing}"

          if [[ -z "$curse_id" ]]; then
            echo "::warning::X-Curse-Project-ID is missing in RGX-Hello.toc. CurseForge upload will be skipped."
          fi

          if [[ -z "$wago_id" ]]; then
            echo "::warning::X-Wago-ID is missing in RGX-Hello.toc. Wago upload will be skipped."
          fi

          if [[ -z "$wowi_id" ]]; then
            echo "::warning::X-WoWI-ID is missing in RGX-Hello.toc. WoWInterface upload will be skipped."
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            norm_tag="${tag#v}"
            norm_ver="${version#v}"

            if [[ "$norm_tag" != "$norm_ver" ]]; then
              echo "::error::Tag '$tag' does not match RGX-Hello.toc version '$version'."
              exit 1
            fi

            if [[ -n "$curse_id" && -z "${CF_API_KEY:-}" ]]; then
              echo "::error::CF_API_KEY secret is missing but X-Curse-Project-ID is set. CurseForge upload cannot run."
              exit 1
            fi
          fi

      - name: Extract Latest Changelog
        id: changelog
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          short_version="${version#v}"

          if [[ -f "docs/changelogs/${short_version}.md" ]]; then
            changelog_content="$(cat "docs/changelogs/${short_version}.md")"
          elif [[ -f "docs/CHANGES.md" ]]; then
            changelog_content="$(awk '
              /^## / {
                if (started) { exit }
                started=1
              }
              started { print }
            ' docs/CHANGES.md)"
          else
            changelog_content="No changelog available."
          fi

          {
            echo "body<<EOF"
            echo "$changelog_content"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          bullet_lines="$(echo "$changelog_content" | grep -E '^[-*]|^\*\*' | head -20 | sed 's/^\*\*[^*]*\*\*[[:space:]]*//' )"
          if ((${#bullet_lines} > 980)); then
            bullet_lines="${bullet_lines:0:977}..."
          fi

          {
            echo "discord_summary<<EOF"
            echo "$bullet_lines"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Package and Release
        uses: BigWigsMods/packager@master

      - name: Upload Notes
        run: |
          echo "CurseForge, Wago, and WoWInterface uploads are handled by BigWigsMods/packager."
          echo "Project IDs come from X-Curse-Project-ID, X-Wago-ID, and X-WoWI-ID in RGX-Hello.toc."

      - name: Send Discord Notification
        if: success()
        shell: bash
        env:
          DISCORD_SUMMARY: ${{ steps.changelog.outputs.discord_summary }}
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TIMESTAMP: ${{ steps.version.outputs.timestamp }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK:-}" ]]; then
            echo "::warning::DISCORD_WEBHOOK secret is empty - skipping Discord notification."
            exit 0
          fi

          summary="${DISCORD_SUMMARY}"
          release_type="${RELEASE_TYPE}"
          version="${RELEASE_VERSION}"

          case "$release_type" in
            "release")
              title="RGX-Hello ${version}"
              color=385018
              footer="RGX Mods • Stable Release"
              description="A new stable release of RGX-Hello is live."
              release_url="https://github.com/DonnieDice/RGX-Hello/releases/tag/${version}"
              downloads="[CurseForge](https://www.curseforge.com/wow/addons/rgx-hello) • [GitHub](${release_url})"
              channel="Release"
              ;;
            "beta")
              title="RGX-Hello ${version} (Beta)"
              color=16744448
              footer="RGX Mods • Beta Build"
              description="Beta build available for testing."
              release_url="https://github.com/DonnieDice/RGX-Hello/releases/tag/${version}"
              downloads="[CurseForge](https://www.curseforge.com/wow/addons/rgx-hello) • [GitHub](${release_url})"
              channel="Beta"
              ;;
            "alpha"|"alpha-branch")
              title="RGX-Hello ${version} (Alpha)"
              color=9109504
              footer="RGX Mods • Alpha Build"
              description="Alpha build available for testing."
              release_url="https://github.com/DonnieDice/RGX-Hello/tree/alpha"
              downloads="[GitHub Alpha Branch](${release_url})"
              channel="Alpha"
              ;;
            "dev")
              title="RGX-Hello ${version} (Dev)"
              color=3447003
              footer="RGX Mods • Dev Build"
              description="Development build from the dev branch."
              release_url="https://github.com/DonnieDice/RGX-Hello/tree/dev"
              downloads="[GitHub Dev Branch](${release_url})"
              channel="Dev"
              ;;
            *)
              title="RGX-Hello ${version}"
              color=10000000
              footer="RGX Mods"
              description="Build completed."
              release_url="https://github.com/DonnieDice/RGX-Hello/releases"
              downloads="[GitHub](${release_url})"
              channel="Unknown"
              ;;
          esac

          jq -n \
            --arg username "RGX-Hello Releases" \
            --arg avatar_url "https://raw.githubusercontent.com/DonnieDice/RGX-Framework/main/media/logo.png" \
            --arg title "$title" \
            --arg url "$release_url" \
            --arg description "$description" \
            --argjson color "$color" \
            --arg footer "$footer" \
            --arg icon_url "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/media/kiwi.gif" \
            --arg timestamp "${RELEASE_TIMESTAMP}" \
            --arg summary "$summary" \
            --arg downloads "$downloads" \
            --arg channel "$channel" \
            '{
              username: $username,
              avatar_url: $avatar_url,
              embeds: [{
                title: $title,
                url: $url,
                description: $description,
                color: $color,
                fields: [
                  { name: "What'\''s New", value: $summary, inline: false },
                  { name: "Downloads", value: $downloads, inline: false },
                  { name: "Channel", value: $channel, inline: true }
                ],
                footer: { text: $footer, icon_url: $icon_url },
                timestamp: $timestamp
              }]
            }' > payload.json

          http_code=$(curl -s -o /tmp/discord_resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST -d @payload.json "$DISCORD_WEBHOOK")
          echo "Discord webhook HTTP status: $http_code"
          if [[ "$http_code" != 2* ]]; then
            echo "::error::Discord notification failed (HTTP $http_code):"
            cat /tmp/discord_resp.txt
            exit 1
          fi

      - name: Send Failure Notification
        if: failure()
        shell: bash
        run: |
          if [[ -z "${DISCORD_WEBHOOK:-}" ]]; then
            echo "::warning::DISCORD_WEBHOOK secret is empty - skipping failure notification."
            exit 0
          fi
          version="${{ steps.version.outputs.version }}"
          run_id="${{ github.run_id }}"
          timestamp="${{ steps.version.outputs.timestamp }}"
          jq -n \
            --arg version "${version:-Unknown}" \
            --arg run_id "$run_id" \
            --arg timestamp "$timestamp" \
            '{
              username: "RGX-Hello Build Failed",
              avatar_url: "https://raw.githubusercontent.com/DonnieDice/RGX-Framework/main/media/logo.png",
              embeds: [{
                title: "RGX-Hello Build Failed",
                description: "The release workflow encountered an error",
                url: ("https://github.com/DonnieDice/RGX-Hello/actions/runs/" + $run_id),
                color: 15158332,
                fields: [
                  { name: "Version", value: $version, inline: true },
                  { name: "Workflow", value: ("https://github.com/DonnieDice/RGX-Hello/actions/runs/" + $run_id), inline: true }
                ],
                footer: {
                  text: "RGX Mods - Build System",
                  icon_url: "https://raw.githubusercontent.com/DonnieDice/RGX-Framework/main/media/logo.png"
                },
                timestamp: $timestamp
              }]
            }' > payload.json
          curl -s -H "Content-Type: application/json" -X POST -d @payload.json "$DISCORD_WEBHOOK"
